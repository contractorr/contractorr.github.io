<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#2e5b47">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:image" content="{{ site.url }}/profile.jpg">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>R</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
</head>

<body>
    <nav class="site-nav">
        <a href="/" class="site-name">Raj Contractor</a>
        <div class="nav-links">
            <a href="/cv/" {% if page.url contains '/cv' %}class="active"{% endif %}>CV</a>
            <a href="/blog/" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a>
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="site-footer">
        <span>© {{ site.time | date: "%Y" }} Raj Contractor</span>
        <span class="footer-links">
            <a href="mailto:rajcontractor@hotmail.co.uk">Email</a>
            <a href="https://www.linkedin.com/in/raj-contractor/" target="_blank" rel="noreferrer">LinkedIn</a>
            <a href="https://github.com/contractorr" target="_blank" rel="noreferrer">GitHub</a>
        </span>
    </footer>
</body>

</html>
