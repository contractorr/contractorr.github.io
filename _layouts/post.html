---
layout: default
---
<article class="post">
    <header class="post-header">
        <p class="post-date">{{ page.date | date: "%-d %B %Y" }}</p>
        <h1>{{ page.title }}</h1>
    </header>

    <div class="post-body">
        {{ content }}
    </div>

    <p class="post-back"><a href="/blog/">← All posts</a></p>
</article>
